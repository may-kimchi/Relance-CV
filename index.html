<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Suivi Candidatures</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
  <style>
    body { background: #0f172a; }
    .card { background: rgba(15, 23, 42, 0.92); }
    .glass { backdrop-filter: blur(12px); }
  </style>
</head>
<body class="text-slate-100 min-h-screen p-4">

  <div class="max-w-xl mx-auto space-y-6">
    <div class="flex items-center justify-between bg-slate-800 p-4 rounded-2xl border border-slate-700">
      <div>
        <h1 class="text-xl font-bold">Suivi Candidatures (Cloud)</h1>
        <p class="text-xs text-slate-400">Synchro Supabase en temps réel</p>
      </div>
      <span id="connectionStatus" class="px-3 py-1 rounded-full text-xs font-semibold bg-amber-600 text-amber-50">Connexion...</span>
    </div>

    <div class="card glass rounded-2xl border border-slate-700 p-5">
      <form id="appForm" class="space-y-4">
        <div>
          <label class="block text-xs mb-1 text-slate-400">Nom de l'entreprise</label>
          <input id="companyName" required class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Ex: Orange Cyberdefense">
        </div>
        <div>
          <label class="block text-xs mb-1 text-slate-400">E-mail de contact</label>
          <input id="contactEmail" type="email" required class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="rh@entreprise.com">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs mb-1 text-slate-400">Date d'envoi</label>
            <input id="sentDate" type="date" required class="w-full rounded-xl bg-slate-900 border border-slate-700 px-3 py-3 outline-none text-sm">
          </div>
          <div>
            <label class="block text-xs mb-1 text-slate-400">Délai relance</label>
            <select id="delayDays" class="w-full rounded-xl bg-slate-900 border border-slate-700 px-3 py-3 outline-none text-sm">
              <option value="5">5 jours</option>
              <option value="7">7 jours</option>
            </select>
          </div>
        </div>
        <button type="submit" class="w-full rounded-xl bg-blue-600 hover:bg-blue-500 py-3 font-semibold text-sm transition">
          Ajouter la candidature
        </button>
      </form>
    </div>

    <div id="appList" class="space-y-3"></div>
  </div>

  <script>
    // Configuration vérifiée sur tes captures d'écran
    const SUPABASE_URL = "https://eyrzntftpqjiggvibntl.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cnpudGZ0cHFqaWdndmlibnRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNTY3MjMsImV4cCI6MjA5NTgzMjcyM30.Z00m-3xASVzUIyetukl9ZIhH0NtAvv8F-VOAHeRtir4";

    // Initialisation sécurisée
    let supabase;
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch(err) {
      alert("Erreur initialisation Supabase : " + err.message);
    }

    async function loadData() {
      const statusEl = document.getElementById("connectionStatus");
      try {
        const { data, error } = await supabase.from('candidatures').select('*');
        if (error) throw error;

        statusEl.textContent = "Nuage Connecté";
        statusEl.className = "px-3 py-1 rounded-full text-xs font-semibold bg-emerald-600 text-emerald-50";
        render(data || []);
      } catch (e) {
        statusEl.textContent = "Erreur Base";
        statusEl.className = "px-3 py-1 rounded-full text-xs font-semibold bg-red-600 text-red-50";
        alert("Erreur de lecture de la table : " + (e.message || JSON.stringify(e)));
      }
    }

    function render(apps) {
      const list = document.getElementById("appList");
      if (!apps.length) {
        list.innerHTML = `<div class="card glass rounded-2xl border border-slate-700 p-4 text-center text-xs text-slate-400">Aucune candidature enregistrée.</div>`;
        return;
      }

      list.innerHTML = apps.map(app => `
        <div class="card glass rounded-2xl border border-slate-700 p-4 flex justify-between items-center">
          <div>
            <h3 class="font-bold text-sm">${app.nom_entreprise}</h3>
            <p class="text-xs text-slate-400">${app.email_contact}</p>
            <p class="text-[10px] text-slate-500">Envoyé le : ${app.date_envoi} (${app.delai}j)</p>
          </div>
          <button onclick="deleteApp(${app.id})" class="px-3 py-1 bg-red-600 hover:bg-red-500 rounded-lg text-xs">Supprimer</button>
        </div>
      `).join("");
    }

    window.deleteApp = async function(id) {
      if (!confirm("Supprimer ?")) return;
      const { error } = await supabase.from('candidatures').delete().eq('id', id);
      if (error) alert("Erreur suppression : " + error.message);
      loadData();
    };

    document.getElementById("appForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const nom_entreprise = document.getElementById("companyName").value.trim();
      const email_contact = document.getElementById("contactEmail").value.trim();
      const date_envoi = document.getElementById("sentDate").value;
      const delai = Number(document.getElementById("delayDays").value);

      const { error } = await supabase.from('candidatures').insert([{ nom_entreprise, email_contact, date_envoi, delai }]);
      if (error) {
        alert("Erreur insertion : " + error.message);
      } else {
        document.getElementById("appForm").reset();
        loadData();
      }
    });

    // Lancement immédiat au chargement de la page
    window.onload = loadData;
  </script>
</body>
</html>
