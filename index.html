<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gestionnaire de Relances de Candidatures</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }
    .card { background: rgba(15, 23, 42, 0.92); }
    .glass { backdrop-filter: blur(12px); }
    .scrollbar-thin::-webkit-scrollbar { height: 8px; width: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">

  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-6">
      <div>
        <h1 class="text-2xl md:text-4xl font-bold">Suivi de mes Candidatures</h1>
        <p class="text-slate-400 mt-1">Application portable pour ne pas oublier de relancer après un CV</p>
      </div>
      <div class="flex gap-2 flex-wrap">
        <button id="exportBtn" class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 hover:bg-slate-700 text-sm">Exporter JSON</button>
        <label class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 hover:bg-slate-700 cursor-pointer text-sm">
          Importer JSON
          <input id="importInput" type="file" accept="application/json" class="hidden">
        </label>
        <button id="clearAllBtn" class="px-4 py-2 rounded-xl bg-red-600 hover:bg-red-500 text-sm">Tout effacer</button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="card glass rounded-2xl border border-slate-700 p-5 lg:col-span-1">
        <h2 id="formTitle" class="text-xl font-semibold mb-4">Ajouter une candidature</h2>

        <form id="appForm" class="space-y-4">
          <div>
            <label class="block text-sm mb-1 text-slate-300">Nom de l'entreprise</label>
            <input id="companyName" required class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ex: Orange Cyberdefense">
          </div>

          <div>
            <label class="block text-sm mb-1 text-slate-300">E-mail du contact / RH</label>
            <input id="contactEmail" type="email" required class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="rh@entreprise.com">
          </div>

          <div>
            <label class="block text-sm mb-1 text-slate-300">Date d'envoi du CV</label>
            <input id="sentDate" type="date" required class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
          </div>

          <div>
            <label class="block text-sm mb-1 text-slate-300">Délai avant relance</label>
            <select id="delayDays" class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
              <option value="5">5 jours</option>
              <option value="7">7 jours</option>
            </select>
          </div>

          <button id="submitFormBtn" class="w-full rounded-xl bg-blue-600 hover:bg-blue-500 py-3 font-semibold transition">
            Enregistrer la candidature
          </button>
        </form>

        <hr class="border-slate-700 my-6">

        <h2 class="text-xl font-semibold mb-4">Modèle de l'e-mail</h2>

        <div class="space-y-4">
          <div>
            <label class="block text-sm mb-1 text-slate-300">Sujet du mail</label>
            <input id="subjectTemplate" class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" />
          </div>

          <div>
            <label class="block text-sm mb-1 text-slate-300">Corps du message</label>
            <textarea id="messageTemplate" rows="8" class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 text-sm scrollbar-thin"></textarea>
          </div>

          <p class="text-xs text-slate-400 leading-relaxed">
            Variables automatiques utilisables : <code class="text-blue-400">{entreprise}</code>, <code class="text-blue-400">{jours}</code>, <code class="text-blue-400">{date}</code>
          </p>

          <button id="saveTemplateBtn" class="w-full rounded-xl bg-emerald-600 hover:bg-emerald-500 py-3 font-semibold transition">
            Sauvegarder le modèle
          </button>
        </div>
      </div>

      <div class="lg:col-span-2 space-y-4">
        <div class="card glass rounded-2xl border border-slate-700 p-5">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <div>
              <h2 class="text-xl font-semibold">Candidatures Actives</h2>
              <p id="statsText" class="text-slate-400 text-sm mt-1">Calcul des délais en cours...</p>
            </div>
            <button id="refreshBtn" class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 hover:bg-slate-700 text-sm">
              Actualiser
            </button>
          </div>
        </div>

        <div id="appList" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "job_followup_manager_v1";

    // Modèle de mail par défaut entièrement en français
    const defaultTemplate = {
      subject: "Suivi de ma candidature - {entreprise}",
      message: `Bonjour l'équipe de {entreprise},

Je me permets de vous recontacter concernant la candidature que je vous ai adressée le {date}. Le délai de {jours} jours étant passé, je souhaitais simplement m'assurer que mon dossier vous était bien parvenu et savoir si vous aviez des retours à me faire.

Je reste extrêmement motivé par l'idée de vous rejoindre et je me tiens à votre entière disposition pour tout échange ou entretien.

En vous souhaitant une excellente journée.

Cordialement,
[Ton Prénom] [Ton Nom]
[Ton Téléphone]

(Pense à attacher ton CV ou à mettre un lien vers ton CV avant d'envoyer !)`
    };

    let state = {
      applications: [],
      template: defaultTemplate
    };
    
    let editingAppId = null; 

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        state = {
          applications: Array.isArray(parsed.applications) ? parsed.applications : [],
          template: parsed.template || defaultTemplate
        };
      } catch (e) {
        console.error("Erreur lors du chargement des données :", e);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('fr-FR', { year: "numeric", month: "short", day: "numeric" });
    }

    function replacePlaceholders(template, app) {
      return template
        .replaceAll("{entreprise}", app.companyName)
        .replaceAll("{jours}", app.delayDays)
        .replaceAll("{date}", formatDate(app.sentDate));
    }

    function getFollowupDate(app) {
      const d = new Date(app.sentDate);
      d.setDate(d.getDate() + Number(app.delayDays));
      return d;
    }

    function isFollowupDue(app) {
      const now = new Date();
      now.setHours(0,0,0,0);
      return now >= getFollowupDate(app);
    }

    function remainingDays(app) {
      const now = new Date();
      now.setHours(0,0,0,0);
      const due = getFollowupDate(app);
      due.setHours(0,0,0,0);
      return Math.ceil((due - now) / (1000 * 60 * 60 * 24));
    }

    function openMailClient(app) {
      const subject = replacePlaceholders(state.template.subject, app);
      const body = replacePlaceholders(state.template.message, app);
      const mailto = `mailto:${encodeURIComponent(app.contactEmail)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.location.href = mailto;
    }

    function render() {
      document.getElementById("subjectTemplate").value = state.template.subject;
      document.getElementById("messageTemplate").value = state.template.message;

      const list = document.getElementById("appList");
      const statsText = document.getElementById("statsText");

      if (!state.applications.length) {
        list.innerHTML = `
          <div class="card glass rounded-2xl border border-slate-700 p-6 text-center text-slate-400">
            Aucune candidature enregistrée pour le moment. Remplis le formulaire de gauche pour commencer.
          </div>
        `;
        statsText.textContent = "0 candidature active";
        return;
      }

      const dueCount = state.applications.filter(isFollowupDue).length;
      statsText.textContent = `${state.applications.length} candidature(s) au total • ${dueCount} prête(s) à être relancée(s)`;

      list.innerHTML = state.applications
        .slice()
        .sort((a, b) => getFollowupDate(a) - getFollowupDate(b))
        .map((app, idx) => {
          const due = isFollowupDue(app);
          const daysLeft = remainingDays(app);
          const dueDate = formatDate(getFollowupDate(app));

          return `
            <div class="card glass rounded-2xl border border-slate-700 p-5">
              <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                  <div class="flex items-center gap-2 flex-wrap">
                    <h3 class="text-lg font-semibold">${escapeHtml(app.companyName)}</h3>
                    <span class="text-xs px-2 py-1 rounded-full font-medium ${due ? 'bg-emerald-600 text-emerald-50' : 'bg-slate-700 text-slate-300'}">
                      ${due ? 'À RELANCER' : `J-${daysLeft} avant relance`}
                    </span>
                  </div>
                  <p class="text-slate-400 text-sm mt-1">${escapeHtml(app.contactEmail)}</p>
                  <p class="text-slate-400 text-xs mt-1 leading-relaxed">
                    Envoyé le : ${formatDate(app.sentDate)} • Délai choisi : ${app.delayDays} jours • Date de relance cible : ${dueDate}
                  </p>
                </div>

                <div class="flex flex-wrap gap-2">
                  ${due ? `<button onclick="openMailClientById('${app.id}')" class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-500 font-semibold transition text-sm">Relancer</button>` : ''}
                  <button onclick="editApp('${app.id}')" class="px-4 py-2 rounded-xl bg-amber-600 hover:bg-amber-500 transition text-sm">Modifier</button>
                  <button onclick="deleteApp('${app.id}')" class="px-4 py-2 rounded-xl bg-red-600 hover:bg-red-500 transition text-sm">Supprimer</button>
                </div>
              </div>
            </div>
          `;
        }).join("");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function openMailClientById(id) {
      const app = state.applications.find(a => a.id === id);
      if (app) openMailClient(app);
    }

    function editApp(id) {
      const app = state.applications.find(a => a.id === id);
      if (!app) return;
      
      editingAppId = id;
      document.getElementById("companyName").value = app.companyName;
      document.getElementById("contactEmail").value = app.contactEmail;
      document.getElementById("sentDate").value = app.sentDate;
      document.getElementById("delayDays").value = app.delayDays;
      
      document.getElementById("formTitle").textContent = "Modifier la candidature";
      const submitBtn = document.getElementById("submitFormBtn");
      submitBtn.textContent = "Mettre à jour la candidature";
      submitBtn.classList.replace("bg-blue-600", "bg-amber-600");
      submitBtn.classList.replace("hover:bg-blue-500", "hover:bg-amber-500");
      
      document.getElementById("appForm").scrollIntoView({ behavior: 'smooth' });
    }

    function deleteApp(id) {
      if (!confirm("Voulez-vous vraiment supprimer cette candidature ?")) return;
      state.applications = state.applications.filter(a => a.id !== id);
      if (editingAppId === id) resetForm();
      saveState();
      render();
    }

    function resetForm() {
      editingAppId = null;
      document.getElementById("appForm").reset();
      document.getElementById("delayDays").value = "5";
      document.getElementById("formTitle").textContent = "Ajouter une candidature";
      const submitBtn = document.getElementById("submitFormBtn");
      submitBtn.textContent = "Enregistrer la candidature";
      submitBtn.classList.replace("bg-amber-600", "bg-blue-600");
      submitBtn.classList.replace("hover:bg-amber-500", "hover:bg-blue-500");
    }

    document.getElementById("appForm").addEventListener("submit", (e) => {
      e.preventDefault();

      const companyName = document.getElementById("companyName").value.trim();
      const contactEmail = document.getElementById("contactEmail").value.trim();
      const sentDate = document.getElementById("sentDate").value;
      const delayDays = Number(document.getElementById("delayDays").value);

      if (editingAppId) {
        const app = state.applications.find(a => a.id === editingAppId);
        if (app) {
          app.companyName = companyName;
          app.contactEmail = contactEmail;
          app.sentDate = sentDate;
          app.delayDays = delayDays;
        }
      } else {
        state.applications.push({
          id: crypto.randomUUID(),
          companyName,
          contactEmail,
          sentDate,
          delayDays,
          createdAt: new Date().toISOString()
        });
      }

      saveState();
      resetForm();
      render();
    });

    document.getElementById("saveTemplateBtn").addEventListener("click", () => {
      state.template.subject = document.getElementById("subjectTemplate").value;
      state.template.message = document.getElementById("messageTemplate").value;
      saveState();
      alert("Modèle d'e-mail sauvegardé !");
    });

    document.getElementById("clearAllBtn").addEventListener("click", () => {
      if (!confirm("Attention, cela va supprimer toutes vos candidatures et restaurer le modèle par défaut. Continuer ?")) return;
      localStorage.removeItem(STORAGE_KEY);
      state = { applications: [], template: defaultTemplate };
      resetForm();
      render();
    });

    document.getElementById("refreshBtn").addEventListener("click", render);

    document.getElementById("exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "sauvegarde-mes-candidatures.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById("importInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const imported = JSON.parse(text);
        state.applications = Array.isArray(imported.applications) ? imported.applications : [];
        state.template = imported.template || defaultTemplate;
        saveState();
        resetForm();
        render();
        alert("Données importées avec succès !");
      } catch (err) {
        alert("Fichier JSON invalide.");
      }
      e.target.value = "";
    });

    loadState();
    render();
  </script>
</body>
</html>
